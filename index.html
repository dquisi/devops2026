<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario Info</title>
</head>
<body>
    <h1>Información del Usuario</h1>
    <button id="load-btn">Cargar Datos</button>
    <div id="error-container" style="color: red; display: none;"></div>
    <div id="data-container" style="display: none;">
        <p><strong>Nombre:</strong> <span id="user-name"></span></p>
        <p><strong>Email:</strong> <span id="user-email"></span></p>
        <p><strong>Ciudad:</strong> <span id="user-city"></span></p>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
